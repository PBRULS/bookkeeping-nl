name: quality

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/quality.yml"
      - "bookkeeping-nl/**"
  pull_request:
    paths:
      - ".github/workflows/quality.yml"
      - "bookkeeping-nl/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bookkeeping-nl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: bookkeeping-nl/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest