version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/bookkeeping-nl"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
